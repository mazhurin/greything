<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreyThing — Submit DID</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 { color: #fff; margin: 0 0 8px 0; }
    p { color: #999; line-height: 1.5; }
    .card {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 20px;
      margin-top: 24px;
    }
    label { display: block; font-size: 14px; margin-bottom: 6px; color: #ccc; }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
    }
    input[type="text"]:focus { outline: none; border-color: #4a9eff; }
    input[type="file"] { margin-top: 4px; }
    button {
      margin-top: 16px;
      padding: 10px 24px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #3a8eef; }
    button:disabled { background: #555; cursor: default; }
    #status { margin-top: 12px; font-size: 14px; min-height: 20px; }
    .ok { color: #8f8; }
    .err { color: #f88; }
    .pending { color: #ff8; }
    .field { margin-bottom: 16px; }
    .hint { color: #666; font-size: 13px; margin-top: 4px; }
    a { color: #4a9eff; }
  </style>
</head>
<body>
  <h1>Submit DID to GreyThing Directory</h1>
  <p>
    Add your externally-hosted DID to the GreyThing discovery database.
    You must prove ownership by signing with your device key.
  </p>

  <div class="card">
    <div class="field">
      <label for="url">URL of your did.json</label>
      <input type="text" id="url" placeholder="https://example.com/.well-known/did.json">
      <div class="hint">e.g. https://example.com/users/alice/did.json</div>
    </div>

    <div class="field">
      <label>Your Ed25519 device key file</label>
      <input type="file" id="keyfile" accept=".json">
      <div class="hint">The JSON key file generated during registration (e.g. device-key-xxx.json)</div>
    </div>

    <button id="btn" onclick="submitDID()">Submit</button>
    <div id="status"></div>
  </div>

  <script>
    function base64urlEncode(bytes) {
      const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
      let s = '';
      for (const b of arr) s += String.fromCharCode(b);
      return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function base64urlDecode(s) {
      s = s.replace(/-/g, '+').replace(/_/g, '/');
      while (s.length % 4) s += '=';
      const bin = atob(s);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return arr;
    }

    async function importEd25519Key(keyFileJSON) {
      if (keyFileJSON.kty !== 'Ed25519') throw new Error('Key must be Ed25519, got ' + keyFileJSON.kty);
      const raw = base64urlDecode(keyFileJSON.privateKeyB64Url);
      const seed = raw.slice(0, 32);
      const pub = raw.slice(32, 64);
      const jwk = {
        kty: 'OKP', crv: 'Ed25519',
        d: base64urlEncode(seed),
        x: base64urlEncode(pub),
      };
      const privateKey = await crypto.subtle.importKey('jwk', jwk, 'Ed25519', false, ['sign']);
      return { privateKey, kid: keyFileJSON.kid, pubMultibase: keyFileJSON.publicKeyMultibase };
    }

    async function submitDID() {
      const url = document.getElementById('url').value.trim();
      const fileInput = document.getElementById('keyfile');
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');

      if (!url) {
        status.className = 'err';
        status.textContent = 'Please enter a URL.';
        return;
      }
      if (!url.startsWith('https://')) {
        status.className = 'err';
        status.textContent = 'URL must start with https://';
        return;
      }
      if (!fileInput.files.length) {
        status.className = 'err';
        status.textContent = 'Please select your device key file.';
        return;
      }

      btn.disabled = true;
      status.className = 'pending';
      status.textContent = 'Loading key...';

      try {
        // Read key file
        const keyText = await fileInput.files[0].text();
        const keyJSON = JSON.parse(keyText);
        const key = await importEd25519Key(keyJSON);

        status.textContent = 'Signing request...';

        // Create signature: sign "submit-did|{url}|{unixTimestamp}"
        const unixTs = String(Math.floor(Date.now() / 1000));
        const payload = 'submit-did|' + url + '|' + unixTs;
        const sig = await crypto.subtle.sign('Ed25519', key.privateKey, new TextEncoder().encode(payload));
        const sigB64 = base64urlEncode(new Uint8Array(sig));

        status.textContent = 'Submitting...';

        // Encode to bypass Cloudflare managed rules which block:
        // - "https://" in POST body (SSRF detection)
        // - ISO timestamps with paths (pattern matching)
        // Server reconstructs the full URL and ISO timestamp on its side.
        const host = url.replace(/^https:\/\//, '').replace(/\/did\.json$/, '');

        const resp = await fetch('/api/v1/external-did', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            h: host,
            t: unixTs,
            s: sigB64,
            k: key.kid,
          }),
        });

        const data = await resp.json().catch(() => ({}));

        if (resp.ok) {
          status.className = 'ok';
          status.textContent = '\u2713 Submitted! DID ' + (data.did || '') + ' is now discoverable on greything.com.';
        } else {
          throw new Error(data.message || 'HTTP ' + resp.status);
        }
      } catch (e) {
        status.className = 'err';
        status.textContent = '\u2717 ' + e.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
